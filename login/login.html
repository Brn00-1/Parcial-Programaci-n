<!-- login.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login / Registro</title>
</head>
<body>

<h2>Iniciar sesión</h2>
<form id="loginForm">
  <input type="text" id="loginUsername" placeholder="Usuario" required>
  <input type="password" id="loginPassword" placeholder="Contraseña" required>
  <button type="submit">Ingresar</button>
</form>
<p id="mensajeLogin"></p>

<hr>

<h2>Registrarse</h2>
<form id="registroForm">
  <input type="text" id="registroUsername" placeholder="Usuario" required>
  <input type="password" id="registroPassword" placeholder="Contraseña" required>
  <button type="submit">Registrarse</button>
</form>
<p id="mensajeRegistro"></p>

<script src="login.js"></script>
</body>
</html>
